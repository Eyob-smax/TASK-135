# Alembic configuration for District Console
# SQLite database with WAL mode and FK enforcement

[alembic]
script_location = database/migrations

# Template for migration files
file_template = %%(rev)s_%%(slug)s

# Truncate long migration slugs
truncate_slug_length = 40

# Timezone for revision timestamps (UTC recommended for consistency)
timezone = UTC

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
